<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedOps Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; color: #1e293b; }
        .navbar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        .navbar-brand { color: #0f172a !important; font-weight: 800; letter-spacing: -0.5px; }
        .nav-link { color: #64748b !important; font-weight: 600; }
        .nav-link:hover { color: #3b82f6 !important; }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; background: #ffffff; }
        .card:hover { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); transform: translateY(-4px); }
        .btn-primary { background: #3b82f6; border: none; border-radius: 8px; font-weight: 600; }
        .btn-primary:hover { background: #2563eb; }
        h1, h2, h3 { font-weight: 700; letter-spacing: -0.5px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top py-3 mb-4">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="/"><i class="fa-solid fa-wave-square text-primary me-2"></i>MedOps<span class="text-primary">.ai</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item"><a class="nav-link px-3" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="/dashboard"><i class="fa-solid fa-chart-pie me-1"></i> Dashboard</a></li>
        <!-- NEW CHAT TAB -->
        <li class="nav-item"><a class="nav-link px-3 text-primary fw-bold" href="/chat"><i class="fa-solid fa-robot me-1"></i> Chat with Data</a></li>
        <li class="nav-item ms-3"><a class="btn btn-primary btn-sm px-4 py-2 shadow-sm" href="/add_data">+ Log Data</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 pb-5">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
